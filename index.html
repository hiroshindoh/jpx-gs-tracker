<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GS Dashboard">
<title>GS Derivatives Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e1520;font-family:'Helvetica Neue',sans-serif;color:#fff;min-height:100vh;padding:12px}
button{cursor:pointer;border:none;border-radius:6px;padding:5px 11px;font-size:11px;font-family:inherit}
textarea,input,select{font-family:inherit}
.card{border-radius:8px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.5);margin-bottom:12px}
.hdr{padding:5px 10px;font-size:10px;font-weight:700;color:#fff}
.ci{background:#fff;padding:10px 6px}
#tip{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:1px solid #bbb;border-radius:8px;padding:10px 14px;font-size:12px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);pointer-events:none;color:#333;display:none}
</style>
</head>
<body>
<div id="root"><div style="color:#ffb74d;padding:20px;text-align:center">読み込み中...</div></div>
<div id="tip"></div>
<script>
var JSON_URL = "https://hiroshindoh.github.io/jpx-gs-tracker/gs_data.json";
var BUY = "#1976d2", SELL = "#d32f2f", ATM_LINE = 54000;
var liveData = null, currentTab = "all";
var predNK = "down", predTX = "up";

var FALLBACK = {date:"2026-03-13",gs:[
  {strike:54000,type:"CALL",side:"Buy",qty:150},
  {strike:54000,type:"PUT",side:"Buy",qty:196},
  {strike:53500,type:"PUT",side:"Buy",qty:12},
  {strike:53375,type:"PUT",side:"Sell",qty:6}
],strikes:{min:53125,max:54125}};

// ── ツールチップ ──
function showTip(s, bl, bv, sl, sv) {
  var t = document.getElementById("tip");
  t.innerHTML = "<b>" + s.toLocaleString() + "円</b><br>"
    + "<span style='color:" + BUY + "'>" + bl + ": " + bv + "枚</span><br>"
    + "<span style='color:" + SELL + "'>" + sl + ": " + sv + "枚</span>";
  t.style.display = "block";
}
function hideTip() { document.getElementById("tip").style.display = "none"; }

// ── localStorage ──
function loadRecs() {
  try { var d = localStorage.getItem("gs_predictions"); return d ? JSON.parse(d) : []; }
  catch(e) { return []; }
}
function saveRecs(r) {
  try { localStorage.setItem("gs_predictions", JSON.stringify(r)); }
  catch(e) { console.log("storage error", e); }
}

// ── スナップショット構築 ──
function buildSnapshot(oi) {
  var mn = (oi.strikes && oi.strikes.min) ? oi.strikes.min : 51000;
  var mx = (oi.strikes && oi.strikes.max) ? oi.strikes.max : 56000;
  var map = {};
  for (var s = 50000; s <= 57000; s += 125) {
    map[s] = {callBuy:0, callSell:0, putBuy:0, putSell:0, disclosed: s >= mn && s <= mx};
  }
  var gs = oi.gs || [];
  for (var i = 0; i < gs.length; i++) {
    var d = gs[i];
    if (!map[d.strike]) map[d.strike] = {callBuy:0, callSell:0, putBuy:0, putSell:0, disclosed:true};
    if (d.type === "CALL" && d.side === "Buy")  map[d.strike].callBuy  = d.qty;
    if (d.type === "CALL" && d.side === "Sell") map[d.strike].callSell = d.qty;
    if (d.type === "PUT"  && d.side === "Buy")  map[d.strike].putBuy   = d.qty;
    if (d.type === "PUT"  && d.side === "Sell") map[d.strike].putSell  = d.qty;
  }
  return map;
}

// ── グラフ① DOM生成 ──
function buildChart1() {
  var cur = (liveData && liveData.oi) ? liveData.oi : FALLBACK;
  var hist = (liveData && liveData.oi_history) ? liveData.oi_history : [];
  var ZCOL = ["#fff9c4","#ffe0b2","#f3e5f5","#e8f5e9","#e3f2fd"];

  var snaps = [];
  for (var i = 0; i < hist.length; i++) {
    snaps.push({
      date: hist[i].date,
      map: buildSnapshot(hist[i]),
      strikes: hist[i].strikes,
      color: ZCOL[i] || "#f5f5f5",
      label: (hist[i].date && hist[i].date.length >= 10) ? hist[i].date.slice(5).replace("-","/") : hist[i].date || "",
      isCur: hist[i].date === cur.date
    });
  }
  var curSnap = null;
  for (var i = 0; i < snaps.length; i++) { if (snaps[i].isCur) { curSnap = snaps[i]; break; } }
  if (!curSnap) curSnap = {
    date: cur.date, map: buildSnapshot(cur), strikes: cur.strikes, color: "#fffde7",
    label: (cur.date && cur.date.length >= 10) ? cur.date.slice(5).replace("-","/") : "03/13",
    isCur: true
  };

  var oldSnaps = [];
  for (var i = 0; i < snaps.length; i++) { if (!snaps[i].isCur) oldSnaps.push(snaps[i]); }

  var ct = 0, pt = 0;
  var ks = Object.keys(curSnap.map);
  for (var i = 0; i < ks.length; i++) { ct += curSnap.map[ks[i]].callBuy; pt += curSnap.map[ks[i]].putBuy; }
  for (var j = 0; j < oldSnaps.length; j++) {
    var oks = Object.keys(oldSnaps[j].map);
    for (var i = 0; i < oks.length; i++) {
      var k = oks[i];
      if (!curSnap.map[k] || curSnap.map[k].callBuy === 0) ct += oldSnaps[j].map[k].callBuy;
      if (!curSnap.map[k] || curSnap.map[k].putBuy  === 0) pt += oldSnaps[j].map[k].putBuy;
    }
  }
  var pcr = (ct + pt) > 0 ? (pt / (ct + pt) * 100).toFixed(2) : "0.00";
  var MAX = 200, RH = 11;

  var wrap = document.createElement("div");
  wrap.className = "ci";
  wrap.addEventListener("mouseleave", hideTip);

  // タイトル + パイチャート
  var titleRow = document.createElement("div");
  titleRow.style.cssText = "display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px";
  var titleLeft = document.createElement("div");
  titleLeft.innerHTML = "<div style='font-weight:700;font-size:12px'>Goldman_Sachs_Japan_CoLtd</div>"
    + "<div style='font-size:11px;color:#555'>建玉残高</div>";
  titleRow.appendChild(titleLeft);
  if (ct + pt > 0) {
    var r=22, cx=28, cy=30, tot=ct+pt, a=(ct/tot)*2*Math.PI;
    var x1=cx+r*Math.sin(a), y1=cy-r*Math.cos(a), lg=a>Math.PI?1:0, lr=r*0.58;
    var clx=cx+lr*Math.sin(a/2), cly=cy-lr*Math.cos(a/2);
    var pm=a+(2*Math.PI-a)/2, plx=cx+lr*Math.sin(pm), ply=cy-lr*Math.cos(pm);
    var pie = document.createElementNS("http://www.w3.org/2000/svg","svg");
    pie.setAttribute("width","115"); pie.setAttribute("height","62"); pie.setAttribute("viewBox","0 0 115 62");
    pie.innerHTML = "<circle cx='" + cx + "' cy='" + cy + "' r='" + r + "' fill='#f5a623'/>"
      + "<path d='M" + cx + "," + cy + " L" + cx + "," + (cy-r) + " A" + r + "," + r + " 0 " + lg + ",1 " + x1 + "," + y1 + " Z' fill='#5b9bd5'/>"
      + "<text x='" + clx + "' y='" + (cly-5) + "' text-anchor='middle' font-size='7' fill='#fff'>call</text>"
      + "<text x='" + clx + "' y='" + (cly+5) + "' text-anchor='middle' font-size='9' font-weight='700' fill='#fff'>" + ct + "</text>"
      + "<text x='" + plx + "' y='" + (ply-5) + "' text-anchor='middle' font-size='7' fill='#fff'>put</text>"
      + "<text x='" + plx + "' y='" + (ply+5) + "' text-anchor='middle' font-size='9' font-weight='700' fill='#fff'>" + pt + "</text>"
      + "<text x='60' y='22' font-size='8' font-weight='700' fill='#555'>PCR</text>"
      + "<text x='60' y='36' font-size='12' font-weight='700' fill='" + BUY + "'>" + pcr + "%</text>";
    titleRow.appendChild(pie);
  }
  wrap.appendChild(titleRow);

  // スケール
  var scale = document.createElement("div");
  scale.style.cssText = "display:grid;grid-template-columns:1fr 68px 1fr;margin-bottom:2px";
  scale.innerHTML = "<div style='display:flex;justify-content:space-between;font-size:7px;color:#888'><span>200</span><span>150</span><span>100</span><span>50</span><span>0</span></div>"
    + "<div></div>"
    + "<div style='display:flex;justify-content:space-between;font-size:7px;color:#888'><span>0</span><span>50</span><span>100</span><span>150</span><span>200</span></div>";
  wrap.appendChild(scale);

  // ヘッダー
  var hdr = document.createElement("div");
  hdr.style.cssText = "display:grid;grid-template-columns:1fr 68px 1fr;border-bottom:1px solid #ccc";
  hdr.innerHTML = "<div style='text-align:center;background:#f5f5f5;font-size:11px;font-weight:700;padding:3px 0'>CALL</div>"
    + "<div style='background:#f5f5f5'></div>"
    + "<div style='text-align:center;background:#f5f5f5;font-size:11px;font-weight:700;padding:3px 0'>PUT</div>";
  wrap.appendChild(hdr);

  // 行
  var allS = [];
  for (var s = 51000; s <= 57000; s += 125) allS.push(s);
  allS.reverse();

  for (var si = 0; si < allS.length; si++) {
    var strike = allS[si];
    var isAtm = strike === ATM_LINE, BH = RH - 3;
    var zones = [];
    for (var j = 0; j < snaps.length; j++) {
      var mn2 = snaps[j].strikes && snaps[j].strikes.min ? snaps[j].strikes.min : 0;
      var mx2 = snaps[j].strikes && snaps[j].strikes.max ? snaps[j].strikes.max : 0;
      if (strike >= mn2 && strike <= mx2) zones.push(snaps[j]);
    }
    var bg = zones.length > 0 ? zones[zones.length-1].color : "#fff";
    var c2 = curSnap.map[strike] || {callBuy:0, callSell:0, putBuy:0, putSell:0};

    var rowWrap = document.createElement("div");
    rowWrap.style.position = "relative";

    // 開示範囲ラベル
    for (var j = 0; j < zones.length; j++) {
      if (zones[j].strikes && zones[j].strikes.max === strike) {
        var lbl = document.createElement("div");
        lbl.style.cssText = "position:absolute;left:0;top:" + (j*10) + "px;z-index:" + (10+j) + ";font-size:7px;font-weight:700;color:#333;padding:0 4px;line-height:10px;pointer-events:none";
        lbl.textContent = "開示範囲（" + zones[j].label + "）";
        rowWrap.appendChild(lbl);
      }
    }

    var row = document.createElement("div");
    row.style.cssText = "display:grid;grid-template-columns:1fr 68px 1fr;height:" + RH + "px";

    // CALL側
    var callDiv = document.createElement("div");
    callDiv.style.cssText = "background:" + bg + ";position:relative;overflow:hidden;border-right:1px solid #ccc";
    (function(s2, cb, cs) {
      callDiv.addEventListener("mouseenter", function() { showTip(s2, "Buy", cb, "Sell", cs); });
    })(strike, c2.callBuy, c2.callSell);
    // 過去データ
    for (var j = 0; j < oldSnaps.length; j++) {
      var o = oldSnaps[j].map[strike];
      if (o) {
        if (o.callBuy > 0) { var d2 = document.createElement("div"); d2.style.cssText = "position:absolute;right:0;top:1px;height:" + BH + "px;width:" + Math.min(o.callBuy/MAX*100,100) + "%;background:rgba(25,118,210,0.25)"; callDiv.appendChild(d2); }
        if (o.callSell > 0) { var d2 = document.createElement("div"); d2.style.cssText = "position:absolute;right:" + Math.min(o.callBuy/MAX*100,100) + "%;top:1px;height:" + BH + "px;width:" + Math.min(o.callSell/MAX*100,100) + "%;background:rgba(211,47,47,0.25)"; callDiv.appendChild(d2); }
      }
    }
    if (c2.callBuy  > 0) { var d2 = document.createElement("div"); d2.style.cssText = "position:absolute;right:0;top:1px;height:" + BH + "px;width:" + Math.min(c2.callBuy/MAX*100,100) + "%;background:" + BUY; callDiv.appendChild(d2); }
    if (c2.callSell > 0) { var d2 = document.createElement("div"); d2.style.cssText = "position:absolute;right:" + Math.min(c2.callBuy/MAX*100,100) + "%;top:1px;height:" + BH + "px;width:" + Math.min(c2.callSell/MAX*100,100) + "%;background:" + SELL; callDiv.appendChild(d2); }
    row.appendChild(callDiv);

    // 中央
    var midDiv = document.createElement("div");
    midDiv.style.cssText = "height:" + RH + "px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:" + (isAtm?700:400) + ";color:#555;background:" + bg;
    midDiv.textContent = strike.toLocaleString();
    row.appendChild(midDiv);

    // PUT側
    var putDiv = document.createElement("div");
    putDiv.style.cssText = "background:" + bg + ";position:relative;overflow:hidden;border-left:1px solid #ccc";
    (function(s2, pb, ps) {
      putDiv.addEventListener("mouseenter", function() { showTip(s2, "Buy", pb, "Sell", ps); });
    })(strike, c2.putBuy, c2.putSell);
    for (var j = 0; j < oldSnaps.length; j++) {
      var o = oldSnaps[j].map[strike];
      if (o) {
        if (o.putBuy  > 0) { var d2 = document.createElement("div"); d2.style.cssText = "position:absolute;left:0;top:1px;height:" + BH + "px;width:" + Math.min(o.putBuy/MAX*100,100) + "%;background:rgba(25,118,210,0.25)"; putDiv.appendChild(d2); }
        if (o.putSell > 0) { var d2 = document.createElement("div"); d2.style.cssText = "position:absolute;left:" + Math.min(o.putBuy/MAX*100,100) + "%;top:1px;height:" + BH + "px;width:" + Math.min(o.putSell/MAX*100,100) + "%;background:rgba(211,47,47,0.25)"; putDiv.appendChild(d2); }
      }
    }
    if (c2.putBuy  > 0) { var d2 = document.createElement("div"); d2.style.cssText = "position:absolute;left:0;top:1px;height:" + BH + "px;width:" + Math.min(c2.putBuy/MAX*100,100) + "%;background:" + BUY; putDiv.appendChild(d2); }
    if (c2.putSell > 0) { var d2 = document.createElement("div"); d2.style.cssText = "position:absolute;left:" + Math.min(c2.putBuy/MAX*100,100) + "%;top:1px;height:" + BH + "px;width:" + Math.min(c2.putSell/MAX*100,100) + "%;background:" + SELL; putDiv.appendChild(d2); }
    row.appendChild(putDiv);

    rowWrap.appendChild(row);
    wrap.appendChild(rowWrap);
  }

  // 凡例
  var lgnd = document.createElement("div");
  lgnd.style.cssText = "margin-top:5px;padding:4px 6px;background:#f5f5f5;border-radius:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:8px";
  for (var i = 0; i < snaps.length; i++) {
    lgnd.innerHTML += "<span><span style='display:inline-block;width:11px;height:9px;background:" + snaps[i].color + ";border:1px solid #ccc;vertical-align:middle'></span> " + snaps[i].label + "</span>";
  }
  lgnd.innerHTML += "<span style='color:" + BUY + "'>&#9632;Buy</span><span style='color:" + SELL + "'>&#9632;Sell</span><span style='color:rgba(25,118,210,0.5)'>&#9632;過去</span>";
  wrap.appendChild(lgnd);
  return wrap;
}

// ── グラフ② HTML文字列 ──
function buildChart2HTML() {
  var vd = null;
  if (liveData && liveData.vol && liveData.vol.gs && liveData.vol.gs.length) {
    var opts = [];
    for (var i = 0; i < liveData.vol.gs.length; i++) {
      if (liveData.vol.gs[i].type === "CALL" || liveData.vol.gs[i].type === "PUT") opts.push(liveData.vol.gs[i]);
    }
    if (opts.length) {
      var m = {};
      var mn = (liveData.oi && liveData.oi.strikes) ? liveData.oi.strikes.min || 51000 : 51000;
      var mx = (liveData.oi && liveData.oi.strikes) ? liveData.oi.strikes.max || 56000 : 56000;
      for (var s = mn; s <= mx; s += 125) m[s] = {strike:s, callVol:0, putVol:0};
      for (var i = 0; i < opts.length; i++) {
        var d = opts[i];
        if (!m[d.strike]) m[d.strike] = {strike:d.strike, callVol:0, putVol:0};
        if (d.type === "CALL") m[d.strike].callVol += d.volume;
        else m[d.strike].putVol += d.volume;
      }
      vd = []; var ks = Object.keys(m);
      for (var i = 0; i < ks.length; i++) vd.push(m[ks[i]]);
      vd.sort(function(a,b){return a.strike-b.strike;});
    }
  }
  if (!vd) { vd = []; for (var s = 51000; s <= 56000; s += 125) vd.push({strike:s, callVol:0, putVol: s===51000?25:0}); }
  var pt = 0, ct = 0;
  for (var i = 0; i < vd.length; i++) { pt += vd[i].putVol; ct += vd[i].callVol; }
  var pcr = ct === 0 ? "100.00" : (pt/(ct+pt)*100).toFixed(2);
  var MAX = 0;
  for (var i = 0; i < vd.length; i++) MAX = Math.max(MAX, vd[i].callVol, vd[i].putVol);
  MAX = Math.max(MAX, 10);
  var RH = 13, vdate = (liveData && liveData.vol && liveData.vol.date) ? liveData.vol.date : "";
  var rows = "";
  for (var i = vd.length-1; i >= 0; i--) {
    var d = vd[i], hc = d.callVol > 0, hp = d.putVol > 0, act = hc || hp;
    rows += "<div style='display:grid;grid-template-columns:1fr 64px 1fr;height:" + RH + "px'>"
      + "<div style='background:#fce8e8;position:relative;overflow:hidden'>"
      + (hc ? "<div style='position:absolute;right:0;top:1px;height:" + (RH-2) + "px;width:" + Math.min(d.callVol/MAX*100,100) + "%;background:#5b9bd5'></div>" : "")
      + "</div>"
      + "<div style='height:" + RH + "px;display:flex;align-items:center;justify-content:center;font-size:" + (act?9:7) + "px;font-weight:" + (act?700:400) + ";color:" + (act?"#e65100":"#777") + ";background:" + (act?"#fff3e0":"#f9f9f9") + "'>" + d.strike.toLocaleString() + "</div>"
      + "<div style='background:#e8f4fd;position:relative;overflow:hidden'>"
      + (hp ? "<div style='position:absolute;left:0;top:1px;height:" + (RH-2) + "px;width:" + Math.min(d.putVol/MAX*100,100) + "%;background:" + SELL + "'></div>" : "")
      + "</div></div>";
  }
  return "<div class='ci'>"
    + "<div style='font-weight:700;font-size:12px;text-align:center'>Goldman_Sachs_Japan_CoLtd</div>"
    + "<div style='font-size:11px;text-align:center;color:#555;margin-bottom:1px'>本日の取引量" + (vdate?"（"+vdate+"）":"") + "</div>"
    + "<div style='background:#ffebee;border:2px solid #e53935;border-radius:6px;padding:5px 8px;text-align:center;font-size:11px;font-weight:700;color:#c62828;margin:4px 0'>売りか買いかは分かりません</div>"
    + "<div style='display:grid;grid-template-columns:1fr 64px 1fr;margin-bottom:2px'>"
    + "<div style='display:flex;justify-content:space-between;font-size:7px;color:#888'><span>" + MAX + "</span><span>" + Math.round(MAX*0.5) + "</span><span>0</span></div><div></div>"
    + "<div style='display:flex;justify-content:space-between;font-size:7px;color:#888'><span>0</span><span>" + Math.round(MAX*0.5) + "</span><span>" + MAX + "</span></div></div>"
    + "<div style='display:grid;grid-template-columns:1fr 64px 1fr;border-bottom:1px solid #ccc'>"
    + "<div style='text-align:center;background:#e3f2fd;font-size:11px;font-weight:700;padding:3px 0'>CALL</div>"
    + "<div style='background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:8px;color:#555'>strike</div>"
    + "<div style='text-align:center;background:#fce4ec;font-size:11px;font-weight:700;padding:3px 0'>PUT(PCR:" + pcr + "%)</div></div>"
    + rows + "</div>";
}

// ── グラフ③ HTML文字列 ──
function buildChart3HTML() {
  var hist = (liveData && liveData.history) ? liveData.history : {};
  var dates = Object.keys(hist).sort();
  if (!dates.length) return "<div style='background:#1a1a2e;padding:24px;color:#888;text-align:center'>"
    + "<div style='font-size:13px;color:#fff;margin-bottom:8px'>GSAX 先物取引量 時系列</div>"
    + "<div style='font-size:11px'>データ蓄積中...</div></div>";
  var ld = dates[dates.length-1];
  var SDEF = [
    {key:"L6",label:"ラージ期近(6月)",color:"#ef5350"},
    {key:"L9",label:"ラージ期先(9月)",color:"#ef5350"},
    {key:"T6",label:"TPX期近(6月)",color:"#43a047"},
    {key:"T9",label:"TPX期先(9月)",color:"#43a047"},
    {key:"M4",label:"ミニ期近(4月)",color:"#ff9800"},
    {key:"M5",label:"ミニ期先(5月)",color:"#ff9800"},
    {key:"M6",label:"ミニ期先先(6月)",color:"#ff9800"}
  ];
  var sHTML = "";
  for (var si = 0; si < SDEF.length; si++) {
    var s = SDEF[si];
    var vals = [], maxV = 0;
    for (var i = 0; i < dates.length; i++) { var v = hist[dates[i]][s.key]||0; vals.push(v); maxV = Math.max(maxV, v); }
    if (maxV <= 1) continue;
    var last = hist[ld][s.key] || 0;
    var W = 300, H = 36, pts = "";
    for (var i = 0; i < vals.length; i++) {
      var x = dates.length > 1 ? i/(dates.length-1)*W : W/2;
      pts += x + "," + (H - (vals[i]/maxV)*(H-4) - 2) + " ";
    }
    sHTML += "<div style='margin-bottom:1px'><div style='display:flex;align-items:center'>"
      + "<div style='width:38px;font-size:7px;color:" + s.color + ";text-align:right;padding-right:3px;flex-shrink:0'>" + maxV.toLocaleString() + "-</div>"
      + "<div style='flex:1;border-bottom:1px solid #2a3a50'>"
      + "<div style='font-size:7px;color:#556;padding-left:2px'>" + s.label + "</div>"
      + "<svg width='100%' height='" + H + "' viewBox='0 0 " + W + " " + H + "' preserveAspectRatio='none'>"

function buildChart4HTML() {

  };
  var dates = Object.keys(fh).sort();
  if (!dates.length) return "<div style='padding:24px;color:#888;text-align:center'>データなし</div>";
  var SR = [
    {label:"期近(2606)",color:"#1976d2",gX:function(d){return d.NK225_2606||0;},gY:function(d){return d.TOPIX_2606||0;}},
    {label:"期先(2609)",color:"#d32f2f",gX:function(d){return d.NK225_2609||0;},gY:function(d){return d.TOPIX_2609||0;}},
    {label:"mini換算",color:"#388e3c",gX:function(d){return((d.MINI_2604||0)+(d.MINI_2605||0)+(d.MINI_2606||0))/10;},gY:function(){return 0;}}
  ];
  var aX=[0], aY=[0];
  for (var i=0; i<dates.length; i++) { var dd=fh[dates[i]]; for (var j=0; j<SR.length; j++) { aX.push(SR[j].gX(dd)); aY.push(SR[j].gY(dd)); } }
  var xMn=aX[0],xMx=aX[0],yMn=aY[0],yMx=aY[0];
  for (var i=1;i<aX.length;i++){xMn=Math.min(xMn,aX[i]);xMx=Math.max(xMx,aX[i]);}
  for (var i=1;i<aY.length;i++){yMn=Math.min(yMn,aY[i]);yMx=Math.max(yMx,aY[i]);}
  var xP=Math.max((xMx-xMn)*0.2,3000), yP=Math.max((yMx-yMn)*0.2,3000);
  var X0=xMn-xP, X1=xMx+xP, Y0=yMn-yP, Y1=yMx+yP;
  var W=300,H=240,PL=52,PR=12,PT=18,PB=36,CW=W-PL-PR,CH=H-PT-PB;
  function px(x){return PL+(x-X0)/(X1-X0)*CW;}
  function py(y){return PT+CH-(y-Y0)/(Y1-Y0)*CH;}
  var zx=Math.round(px(0)), zy=Math.round(py(0));
  var stps=[500,1000,2000,5000,10000,20000,50000], xSt=stps[0], ySt=stps[0];
  for (var i=0;i<stps.length;i++){if((X1-X0)/stps[i]<8){xSt=stps[i];break;}}
  for (var i=0;i<stps.length;i++){if((Y1-Y0)/stps[i]<8){ySt=stps[i];break;}}
  var grid="";
  for (var v=Math.ceil(X0/xSt)*xSt; v<=X1; v+=xSt) {
    var gx=Math.round(px(v));
    grid += "<line x1='" + gx + "' y1='" + PT + "' x2='" + gx + "' y2='" + (PT+CH) + "' stroke='#eee' stroke-width='1'/>"

  }
  for (var v=Math.ceil(Y0/ySt)*ySt; v<=Y1; v+=ySt) {
    var gy=Math.round(py(v));
    grid += "<line x1='" + PL + "' y1='" + gy + "' x2='" + (PL+CW) + "' y2='" + gy + "' stroke='#eee' stroke-width='1'/>"
      + "<text x='" + (PL-4) + "' y='" + (gy+3) + "' text-anchor='end' font-size='7' fill='#999'>" + (v/1000).toFixed(0) + "k</text>";
  }
  var svg="";
  for (var si=0; si<SR.length; si++) {
    var s=SR[si], pts=[];
    for (var i=0; i<dates.length; i++) pts.push({x:Math.round(px(s.gX(fh[dates[i]]))*10)/10, y:Math.round(py(s.gY(fh[dates[i]]))*10)/10});
    if (pts.length > 1) {
      var pd=""; for (var i=0;i<pts.length;i++) pd += (i===0?"M":"L") + pts[i].x + "," + pts[i].y;
      svg += "<path d='" + pd + "' fill='none' stroke='" + s.color + "' stroke-width='2' opacity='0.7'/>";
    }
    for (var i=0; i<pts.length-1; i++) svg += "<circle cx='" + pts[i].x + "' cy='" + pts[i].y + "' r='4' fill='white' stroke='" + s.color + "' stroke-width='1.5'/>";
    var lp=pts[pts.length-1];
    svg += "<circle cx='" + lp.x + "' cy='" + lp.y + "' r='6' fill='" + s.color + "' fill-opacity='0.9' stroke='white' stroke-width='1'/>"
      + "<text x='" + (lp.x+8) + "' y='" + (lp.y+4) + "' font-size='8' fill='" + s.color + "' font-weight='700'>" + s.label + "</text>";
  }
  var lgnd=""; for (var si=0;si<SR.length;si++) lgnd += "<span style='margin-right:10px;font-size:9px;color:" + SR[si].color + "'>&#9679; " + SR[si].label + "</span>";
  var dl = dates.length>1 ? dates[0].slice(5)+" 〜 "+dates[dates.length-1].slice(5) : dates[0].slice(5);
  return "<div class='ci'>"
    + "<div style='font-weight:700;font-size:11px;text-align:center;margin-bottom:2px'>Goldman Sachs &#8212; 先物建玉推移</div>"
    + "<div style='font-size:9px;text-align:center;color:#888;margin-bottom:4px'>" + dl + "（" + dates.length + "週分）</div>"
    + "<svg width='100%' viewBox='0 0 " + W + " " + H + "' style='overflow:visible'>"
    + grid
    + "<line x1='" + PL + "' y1='" + zy + "' x2='" + (PL+CW) + "' y2='" + zy + "' stroke='#333' stroke-width='1.5'/>"
    + "<line x1='" + zx + "' y1='" + PT + "' x2='" + zx + "' y2='" + (PT+CH) + "' stroke='#333' stroke-width='1.5'/>"
    + "<text x='" + (PL+CW/2) + "' y='" + (H-2) + "' text-anchor='middle' font-size='8' fill='#555'>Sell &lt;&#8212; NK225 &#8212;&gt; Buy</text>"
    + "<text x='10' y='" + (PT+CH/2) + "' text-anchor='middle' font-size='8' fill='#555' transform='rotate(-90,10," + (PT+CH/2) + ")'>Sell &lt;&#8212; TOPIX &#8212;&gt; Buy</text>"
    + svg + "</svg>"
    + "<div style='padding:4px 0;font-size:9px'>" + lgnd + "</div>"

}
