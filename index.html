<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>GS Derivatives Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e1520;font-family:'Helvetica Neue',sans-serif;color:#fff;padding:12px}
button{cursor:pointer;border:none;border-radius:6px;padding:5px 11px;font-size:11px}
.card{border-radius:8px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.5);margin-bottom:12px}

<body>
<div id="root"><div style="color:#ffb74d;padding:20px;text-align:center">読み込み中...</div></div>
<div id="tip" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:1px solid #bbb;border-radius:8px;padding:10px 14px;font-size:12px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);pointer-events:none;color:#333;display:none"></div>
<script>
// エラーを画面に表示
window.onerror = function(msg, url, line, col, err) {
  document.getElementById("root").innerHTML =
    "<div style='background:#c62828;color:#fff;padding:16px;border-radius:8px;margin:12px 0;font-size:12px'>"
    + "<b>JS Error (line "+line+"):</b><br>" + msg
    + (err && err.stack ? "<br><pre style='font-size:9px;margin-top:8px;white-space:pre-wrap'>"+err.stack+"</pre>" : "")
    + "</div>";
  return true;
};
</script>
<script>
var JSON_URL="https://hiroshindoh.github.io/jpx-gs-tracker/gs_data.json";
var BUY="#1976d2",SELL="#d32f2f";
var ATM_LINE=54000;
var liveData=null,currentTab="all";
var predState={nk225:"down",topix:"up"};
var c1tips={};

var FALLBACK_OI={date:"2026-03-13",gs:[
  {strike:54000,type:"CALL",side:"Buy",qty:150},
  {strike:54000,type:"PUT",side:"Buy",qty:196},
  {strike:53500,type:"PUT",side:"Buy",qty:12},
  {strike:53375,type:"PUT",side:"Sell",qty:6}
],strikes:{min:53125,max:54125}};

function showTip(s,bl,bv,sl,sv){
  var t=document.getElementById("tip");
  t.innerHTML="<b>"+s.toLocaleString()+"円</b><br><span style='color:"+BUY+"'>"+bl+": "+bv+"枚</span><br><span style='color:"+SELL+"'>"+sl+": "+sv+"枚</span>";
  t.style.display="block";
}
function hideTip(){document.getElementById("tip").style.display="none";}
function doC1Tip(s,side){
  var d=c1tips[s]||{cb:0,cs:0,pb:0,ps:0};
  if(side===0)showTip(s,"Buy",d.cb,"Sell",d.cs);
  else showTip(s,"Buy",d.pb,"Sell",d.ps);
}

function loadRecs(){
  try{var d=localStorage.getItem("gs_predictions");return d?JSON.parse(d):[];}
  catch(e){return[];}
}
function saveRecs(r){
  try{localStorage.setItem("gs_predictions",JSON.stringify(r));}
  catch(e){console.log("storage error",e);}
}

function buildSnapshot(oi){
  var mn=oi.strikes&&oi.strikes.min?oi.strikes.min:51000;
  var mx=oi.strikes&&oi.strikes.max?oi.strikes.max:56000;
  var map={};
  for(var s=50000;s<=57000;s+=125){
    map[s]={strike:s,callBuy:0,callSell:0,putBuy:0,putSell:0,disclosed:s>=mn&&s<=mx};
  }
  var gs=oi.gs||[];
  for(var i=0;i<gs.length;i++){
    var d=gs[i];
    if(!map[d.strike])map[d.strike]={strike:d.strike,callBuy:0,callSell:0,putBuy:0,putSell:0,disclosed:true};
    if(d.type==="CALL"&&d.side==="Buy")map[d.strike].callBuy=d.qty;
    if(d.type==="CALL"&&d.side==="Sell")map[d.strike].callSell=d.qty;
    if(d.type==="PUT"&&d.side==="Buy")map[d.strike].putBuy=d.qty;
    if(d.type==="PUT"&&d.side==="Sell")map[d.strike].putSell=d.qty;
  }
  return map;
}

function makeChart1(){
  var cur=liveData&&liveData.oi?liveData.oi:FALLBACK_OI;
  var hist=liveData&&liveData.oi_history?liveData.oi_history:[];
  var ZCOL=["#fff9c4","#ffe0b2","#f3e5f5","#e8f5e9"];
  var snaps=[];
  for(var i=0;i<hist.length;i++){
    var h=hist[i];
    snaps.push({date:h.date,map:buildSnapshot(h),strikes:h.strikes,
      color:ZCOL[i]||"#f5f5f5",
      label:h.date&&h.date.length>=10?h.date.slice(5).replace("-","/"):h.date||"",
      isCur:h.date===cur.date});
  }
  var curSnap=null;
  for(var i=0;i<snaps.length;i++){if(snaps[i].isCur){curSnap=snaps[i];break;}}
  if(!curSnap)curSnap={date:cur.date,map:buildSnapshot(cur),strikes:cur.strikes,
    color:"#fffde7",
    label:cur.date&&cur.date.length>=10?cur.date.slice(5).replace("-","/"):"03/13",
    isCur:true};
  var allS=[];
  for(var s=51000;s<=57000;s+=125)allS.push(s);
  var ct=0,pt=0;
  var csKeys=Object.keys(curSnap.map);
  for(var i=0;i<csKeys.length;i++){
    ct+=curSnap.map[csKeys[i]].callBuy;
    pt+=curSnap.map[csKeys[i]].putBuy;
  }
  var oldSnaps=[];
  for(var i=0;i<snaps.length;i++){if(!snaps[i].isCur)oldSnaps.push(snaps[i]);}
  for(var i=0;i<oldSnaps.length;i++){
    var sKeys=Object.keys(oldSnaps[i].map);
    for(var j=0;j<sKeys.length;j++){
      var k=sKeys[j];
      if(!curSnap.map[k]||curSnap.map[k].callBuy===0)ct+=oldSnaps[i].map[k].callBuy;
      if(!curSnap.map[k]||curSnap.map[k].putBuy===0)pt+=oldSnaps[i].map[k].putBuy;
    }
  }
  var pcr=(ct+pt)>0?(pt/(ct+pt)*100).toFixed(2):"0.00";
  var MAX=200,RH=11;
  var pie="";
  if(ct+pt>0){
    var r=22,cx=28,cy=30,tot=ct+pt,a=(ct/tot)*2*Math.PI;
    var x1=cx+r*Math.sin(a),y1=cy-r*Math.cos(a),lg=a>Math.PI?1:0,lr=r*0.58;
    var clx=cx+lr*Math.sin(a/2),cly=cy-lr*Math.cos(a/2);
    var pm=a+(2*Math.PI-a)/2,plx=cx+lr*Math.sin(pm),ply=cy-lr*Math.cos(pm);
    pie="<svg width='115' height='62' viewBox='0 0 115 62'>"
      +"<circle cx='"+cx+"' cy='"+cy+"' r='"+r+"' fill='#f5a623'/>"
      +"<path d='M"+cx+","+cy+" L"+cx+","+(cy-r)+" A"+r+","+r+" 0 "+lg+",1 "+x1+","+y1+" Z' fill='#5b9bd5'/>"
      +"<text x='"+clx+"' y='"+(cly-5)+"' text-anchor='middle' font-size='7' fill='#fff'>call</text>"
      +"<text x='"+clx+"' y='"+(cly+5)+"' text-anchor='middle' font-size='9' font-weight='700' fill='#fff'>"+ct+"</text>"
      +"<text x='"+plx+"' y='"+(ply-5)+"' text-anchor='middle' font-size='7' fill='#fff'>put</text>"
      +"<text x='"+plx+"' y='"+(ply+5)+"' text-anchor='middle' font-size='9' font-weight='700' fill='#fff'>"+pt+"</text>"
      +"<text x='60' y='22' font-size='8' font-weight='700' fill='#555'>PCR</text>"
      +"<text x='60' y='36' font-size='12' font-weight='700' fill='"+BUY+"'>"+pcr+"%</text>"
      +"</svg>";
  }
  var cd=[];
  for(var i=0;i<allS.length;i++){
    var strike=allS[i];
    var d2=curSnap.map[strike]||{strike:strike,callBuy:0,callSell:0,putBuy:0,putSell:0};
    var zones=[];
    for(var j=0;j<snaps.length;j++){
      var mn2=snaps[j].strikes&&snaps[j].strikes.min?snaps[j].strikes.min:0;
      var mx2=snaps[j].strikes&&snaps[j].strikes.max?snaps[j].strikes.max:0;
      if(strike>=mn2&&strike<=mx2)zones.push(snaps[j]);
    }
    cd.push({strike:strike,callBuy:d2.callBuy,callSell:d2.callSell,putBuy:d2.putBuy,putSell:d2.putSell,zones:zones});
  }
  var data=cd.slice().reverse();
  var rows="";
  for(var i=0;i<data.length;i++){
    var d=data[i];
    var isAtm=d.strike===ATM_LINE,BH=RH-3;
    var bg=d.zones&&d.zones.length>0?d.zones[d.zones.length-1].color:"#fff";
    var lbl="";
    for(var j=0;j<d.zones.length;j++){
      var z=d.zones[j];
      if(z.strikes&&z.strikes.max&&d.strike===z.strikes.max){
        lbl+="<div style='position:absolute;left:0;top:"+(j*10)+"px;z-index:"+(10+j)+";font-size:7px;font-weight:700;color:#333;padding:0 4px;line-height:10px;pointer-events:none'>"
          +"開示範囲（"+z.label+"）</div>";
      }
    }
    var oC="",oP="";
    for(var j=0;j<oldSnaps.length;j++){
      var o=oldSnaps[j].map[d.strike];
      if(!o)continue;
      if(o.callBuy>0)oC+="<div style='position:absolute;right:0;top:1px;height:"+BH+"px;width:"+Math.min(o.callBuy/MAX*100,100)+"%;background:rgba(25,118,210,0.25)'></div>";
      if(o.callSell>0)oC+="<div style='position:absolute;right:"+Math.min(o.callBuy/MAX*100,100)+"%;top:1px;height:"+BH+"px;width:"+Math.min(o.callSell/MAX*100,100)+"%;background:rgba(211,47,47,0.25)'></div>";
      if(o.putBuy>0)oP+="<div style='position:absolute;left:0;top:1px;height:"+BH+"px;width:"+Math.min(o.putBuy/MAX*100,100)+"%;background:rgba(25,118,210,0.25)'></div>";
      if(o.putSell>0)oP+="<div style='position:absolute;left:"+Math.min(o.putBuy/MAX*100,100)+"%;top:1px;height:"+BH+"px;width:"+Math.min(o.putSell/MAX*100,100)+"%;background:rgba(211,47,47,0.25)'></div>";
    }
    var c2=curSnap.map[d.strike]||{callBuy:0,callSell:0,putBuy:0,putSell:0};
    c1tips[d.strike]={cb:c2.callBuy,cs:c2.callSell,pb:c2.putBuy,ps:c2.putSell};
    var cBw=Math.min(c2.callBuy/MAX*100,100),cSw=Math.min(c2.callSell/MAX*100,100);
    var pBw=Math.min(c2.putBuy/MAX*100,100),pSw=Math.min(c2.putSell/MAX*100,100);
    var cB=c2.callBuy>0?"<div style='position:absolute;right:0;top:1px;height:"+BH+"px;width:"+cBw+"%;background:"+BUY+"'></div>":"";
    var cS=c2.callSell>0?"<div style='position:absolute;right:"+cBw+"%;top:1px;height:"+BH+"px;width:"+cSw+"%;background:"+SELL+"'></div>":"";
    var pB=c2.putBuy>0?"<div style='position:absolute;left:0;top:1px;height:"+BH+"px;width:"+pBw+"%;background:"+BUY+"'></div>":"";
    var pS=c2.putSell>0?"<div style='position:absolute;left:"+pBw+"%;top:1px;height:"+BH+"px;width:"+pSw+"%;background:"+SELL+"'></div>":"";
    rows+="<div style='position:relative'>"+lbl
      +"<div style='display:grid;grid-template-columns:1fr 68px 1fr;height:"+RH+"px'>"
      +"<div style='background:"+bg+";position:relative;overflow:hidden;border-right:1px solid #ccc'"
      +" onmouseenter='doC1Tip("+d.strike+",0)'>"
      +oC+cB+cS+"</div>"
      +"<div style='height:"+RH+"px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:"+(isAtm?700:400)+";color:#555;background:"+bg+"'>"+d.strike.toLocaleString()+"</div>"
      +"<div style='background:"+bg+";position:relative;overflow:hidden;border-left:1px solid #ccc'"
      +" onmouseenter='doC1Tip("+d.strike+",1)'>"
      +oP+pB+pS+"</div>"
      +"</div></div>";
  }
  var lgnd="";
  for(var i=0;i<snaps.length;i++){
    lgnd+="<span style='margin-right:6px'><span style='display:inline-block;width:11px;height:9px;background:"+snaps[i].color+";border:1px solid #ccc;vertical-align:middle'></span>"
      +" <span style='font-size:8px'>"+snaps[i].label+"</span></span>";
  }
  return "<div class='ci' onmouseleave='hideTip()'>"
    +"<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px'>"
    +"<div><div style='font-weight:700;font-size:12px'>Goldman_Sachs_Japan_CoLtd</div>"
    +"<div style='font-size:11px;color:#555'>建玉残高</div></div>"+pie+"</div>"
    +"<div style='display:grid;grid-template-columns:1fr 68px 1fr;margin-bottom:2px'>"
    +"<div style='display:flex;justify-content:space-between;font-size:7px;color:#888'><span>200</span><span>150</span><span>100</span><span>50</span><span>0</span></div><div></div>"
    +"<div style='display:flex;justify-content:space-between;font-size:7px;color:#888'><span>0</span><span>50</span><span>100</span><span>150</span><span>200</span></div></div>"
    +"<div style='display:grid;grid-template-columns:1fr 68px 1fr;border-bottom:1px solid #ccc'>"
    +"<div style='text-align:center;background:#f5f5f5;font-size:11px;font-weight:700;padding:3px 0'>CALL</div>"
    +"<div style='background:#f5f5f5'></div>"
    +"<div style='text-align:center;background:#f5f5f5;font-size:11px;font-weight:700;padding:3px 0'>PUT</div></div>"
    +rows
    +"<div style='margin-top:5px;padding:4px 6px;background:#f5f5f5;border-radius:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center'>"
    +lgnd+"<span style='color:"+BUY+";font-size:8px'>&#9632;Buy</span>"
    +"<span style='color:"+SELL+";font-size:8px'>&#9632;Sell</span>"
    +"<span style='color:rgba(25,118,210,0.5);font-size:8px'>&#9632;過去</span></div></div>";
}

function makeChart2(){
  var vd=null;
  if(liveData&&liveData.vol&&liveData.vol.gs&&liveData.vol.gs.length){
    var opts=[];
    for(var i=0;i<liveData.vol.gs.length;i++){
      if(liveData.vol.gs[i].type==="CALL"||liveData.vol.gs[i].type==="PUT")opts.push(liveData.vol.gs[i]);
    }
    if(opts.length){
      var m={};
      var mn=liveData.oi&&liveData.oi.strikes?liveData.oi.strikes.min||51000:51000;
      var mx=liveData.oi&&liveData.oi.strikes?liveData.oi.strikes.max||56000:56000;
      for(var s=mn;s<=mx;s+=125)m[s]={strike:s,callVol:0,putVol:0};
      for(var i=0;i<opts.length;i++){
        var d=opts[i];
        if(!m[d.strike])m[d.strike]={strike:d.strike,callVol:0,putVol:0};
        if(d.type==="CALL")m[d.strike].callVol+=d.volume;
        else m[d.strike].putVol+=d.volume;
      }
      vd=[];var keys=Object.keys(m);
      for(var i=0;i<keys.length;i++)vd.push(m[keys[i]]);
      vd.sort(function(a,b){return a.strike-b.strike;});
    }
  }
  if(!vd){
    vd=[];for(var s=51000;s<=56000;s+=125)vd.push({strike:s,callVol:0,putVol:s===51000?25:0});
  }
  var pt=0,ct=0;
  for(var i=0;i<vd.length;i++){pt+=vd[i].putVol;ct+=vd[i].callVol;}
  var pcr=ct===0?"100.00":(pt/(ct+pt)*100).toFixed(2);
  var MAX=0;
  for(var i=0;i<vd.length;i++)MAX=Math.max(MAX,vd[i].callVol,vd[i].putVol);
  MAX=Math.max(MAX,10);
  var RH=13;
  var vdate=liveData&&liveData.vol&&liveData.vol.date?liveData.vol.date:"";
  var data=vd.slice().reverse();
  var rows="";
  for(var i=0;i<data.length;i++){
    var d=data[i];
    var hc=d.callVol>0,hp=d.putVol>0,act=hc||hp;
    rows+="<div style='display:grid;grid-template-columns:1fr 64px 1fr;height:"+RH+"px'>"
      +"<div style='background:#fce8e8;position:relative;overflow:hidden'>"
      +(hc?"<div style='position:absolute;right:0;top:1px;height:"+(RH-2)+"px;width:"+Math.min(d.callVol/MAX*100,100)+"%;background:#5b9bd5'></div>":"")
      +"</div>"
      +"<div style='height:"+RH+"px;display:flex;align-items:center;justify-content:center;font-size:"+(act?9:7)+"px;font-weight:"+(act?700:400)+";color:"+(act?"#e65100":"#777")+";background:"+(act?"#fff3e0":"#f9f9f9")+"'>"+d.strike.toLocaleString()+"</div>"
      +"<div style='background:#e8f4fd;position:relative;overflow:hidden'>"
      +(hp?"<div style='position:absolute;left:0;top:1px;height:"+(RH-2)+"px;width:"+Math.min(d.putVol/MAX*100,100)+"%;background:"+SELL+"'></div>":"")
      +"</div></div>";
  }
  return "<div class='ci'>"
    +"<div style='font-weight:700;font-size:12px;text-align:center'>Goldman_Sachs_Japan_CoLtd</div>"
    +"<div style='font-size:11px;text-align:center;color:#555;margin-bottom:1px'>本日の取引量"+(vdate?"（"+vdate+"）":"")+"</div>"
    +"<div style='background:#ffebee;border:2px solid #e53935;border-radius:6px;padding:5px 8px;text-align:center;font-size:11px;font-weight:700;color:#c62828;margin:4px 0'>売りか買いかは分かりません</div>"
    +"<div style='display:grid;grid-template-columns:1fr 64px 1fr;margin-bottom:2px'>"
    +"<div style='display:flex;justify-content:space-between;font-size:7px;color:#888'><span>"+MAX+"</span><span>"+Math.round(MAX*0.5)+"</span><span>0</span></div><div></div>"
    +"<div style='display:flex;justify-content:space-between;font-size:7px;color:#888'><span>0</span><span>"+Math.round(MAX*0.5)+"</span><span>"+MAX+"</span></div></div>"
    +"<div style='display:grid;grid-template-columns:1fr 64px 1fr;border-bottom:1px solid #ccc'>"
    +"<div style='text-align:center;background:#e3f2fd;font-size:11px;font-weight:700;padding:3px 0'>CALL</div>"
    +"<div style='background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:8px;color:#555'>strike</div>"
    +"<div style='text-align:center;background:#fce4ec;font-size:11px;font-weight:700;padding:3px 0'>PUT(PCR:"+pcr+"%)</div></div>"
    +rows+"</div>";
}

function makeChart3(){
  var hist=liveData&&liveData.history?liveData.history:{};
  var dates=Object.keys(hist).sort();
  if(!dates.length)return "<div style='background:#1a1a2e;padding:24px;color:#888;text-align:center'>"
    +"<div style='font-size:13px;color:#fff;margin-bottom:8px'>GSAX 先物取引量 時系列</div>"
    +"<div style='font-size:11px'>データ蓄積中...</div></div>";
  var ld=dates[dates.length-1];
  var SDEF=[
    {key:"L6",label:"ラージ期近(6月)",color:"#ef5350"},
    {key:"L9",label:"ラージ期先(9月)",color:"#ef5350"},
    {key:"T6",label:"TPX期近(6月)",color:"#43a047"},
    {key:"T9",label:"TPX期先(9月)",color:"#43a047"},
    {key:"M4",label:"ミニ期近(4月)",color:"#ff9800"},
    {key:"M5",label:"ミニ期先(5月)",color:"#ff9800"},
    {key:"M6",label:"ミニ期先先(6月)",color:"#ff9800"}
  ];
  var sHTML="";
  for(var si=0;si<SDEF.length;si++){
    var s=SDEF[si];
    var vals=[];
    for(var i=0;i<dates.length;i++)vals.push(hist[dates[i]][s.key]||0);
    var maxV=0;for(var i=0;i<vals.length;i++)maxV=Math.max(maxV,vals[i]);
    if(maxV<=1)continue;
    var last=hist[ld][s.key]||0;
    var W=300,H=36;
    var pts="";
    for(var i=0;i<vals.length;i++){
      var x=dates.length>1?i/(dates.length-1)*W:W/2;
      var y=H-(vals[i]/maxV)*(H-4)-2;
      pts+=(i===0?"":"")+x+","+y+" ";
    }
    sHTML+="<div style='margin-bottom:1px'><div style='display:flex;align-items:center'>"
      +"<div style='width:38px;font-size:7px;color:"+s.color+";text-align:right;padding-right:3px;flex-shrink:0'>"+maxV.toLocaleString()+"-</div>"
      +"<div style='flex:1;border-bottom:1px solid #2a3a50'>"
      +"<div style='font-size:7px;color:#556;padding-left:2px'>"+s.label+"</div>"
      +"<svg width='100%' height='"+H+"' viewBox='0 0 "+W+" "+H+"' preserveAspectRatio='none'>"
      +"<polyline points='"+pts+"' fill='none' stroke='"+s.color+"' stroke-width='1.5'/></svg>"
      +"<div style='font-size:7px;color:#556;padding-left:2px'>0-</div></div>"
      +"<div style='width:44px;text-align:right;font-size:10px;color:"+(last>0?s.color:"#444")+";font-weight:700;padding-left:3px;flex-shrink:0'>"+(last>0?last.toLocaleString():"-")+"</div>"
      +"</div></div>";
  }
  var xL="";var step=Math.max(1,Math.floor(dates.length/6));
  for(var i=0;i<dates.length;i+=step)xL+=dates[i].slice(5).replace("-","/")+"  ";
  return "<div style='background:#1a1a2e;padding:10px 6px;color:#fff'>"
    +"<div style='font-weight:700;font-size:13px;margin-bottom:2px'>GSAX 先物取引量 "+ld+"現在</div>"

function makeChart4(){
  var fh=liveData&&liveData.fut_oi_history?liveData.fut_oi_history:{
    "2026-03-27":{NK225_2606:-13190,NK225_2609:27,MINI_2604:10000,MINI_2605:0,MINI_2606:0,TOPIX_2606:-30704,TOPIX_2609:-600},
    "2026-04-03":{NK225_2606:-6893,NK225_2609:27,MINI_2604:9000,MINI_2605:0,MINI_2606:0,TOPIX_2606:11258,TOPIX_2609:-600}
  };
  var dates=Object.keys(fh).sort();
  if(!dates.length)return "<div style='padding:24px;color:#888;text-align:center'>データなし</div>";
  var SR=[
    {id:"near",label:"期近(2606)",color:"#1976d2",
     gX:function(d){return d.NK225_2606||0;},gY:function(d){return d.TOPIX_2606||0;}},
    {id:"far",label:"期先(2609)",color:"#d32f2f",
     gX:function(d){return d.NK225_2609||0;},gY:function(d){return d.TOPIX_2609||0;}},
    {id:"mini",label:"mini換算",color:"#388e3c",
     gX:function(d){return((d.MINI_2604||0)+(d.MINI_2605||0)+(d.MINI_2606||0))/10;},
     gY:function(d){return 0;}}
  ];
  var aX=[0],aY=[0];
  for(var i=0;i<dates.length;i++){
    var d=fh[dates[i]];
    for(var j=0;j<SR.length;j++){aX.push(SR[j].gX(d));aY.push(SR[j].gY(d));}
  }
  var xMn=aX[0],xMx=aX[0];
  for(var i=1;i<aX.length;i++){xMn=Math.min(xMn,aX[i]);xMx=Math.max(xMx,aX[i]);}
  var yMn=aY[0],yMx=aY[0];
  for(var i=1;i<aY.length;i++){yMn=Math.min(yMn,aY[i]);yMx=Math.max(yMx,aY[i]);}
  var xP=Math.max((xMx-xMn)*0.2,3000),yP=Math.max((yMx-yMn)*0.2,3000);
  var X0=xMn-xP,X1=xMx+xP,Y0=yMn-yP,Y1=yMx+yP;
  var W=300,H=240,PL=52,PR=12,PT=18,PB=36,CW=W-PL-PR,CH=H-PT-PB;
  function px(x){return PL+(x-X0)/(X1-X0)*CW;}
  function py(y){return PT+CH-(y-Y0)/(Y1-Y0)*CH;}
  var zx=Math.round(px(0)),zy=Math.round(py(0));
  var stps=[500,1000,2000,5000,10000,20000,50000];
  var xSt=stps[0],ySt=stps[0];
  for(var i=0;i<stps.length;i++){if((X1-X0)/stps[i]<8){xSt=stps[i];break;}}
  for(var i=0;i<stps.length;i++){if((Y1-Y0)/stps[i]<8){ySt=stps[i];break;}}
  var grid="";
  for(var v=Math.ceil(X0/xSt)*xSt;v<=X1;v+=xSt){
    var gx=Math.round(px(v));
    grid+="<line x1='"+gx+"' y1='"+PT+"' x2='"+gx+"' y2='"+(PT+CH)+"' stroke='#eee' stroke-width='1'/>"
      +"<text x='"+gx+"' y='"+(PT+CH+11)+"' text-anchor='middle' font-size='7' fill='#999'>"+(v/1000).toFixed(0)+"k</text>";
  }
  for(var v=Math.ceil(Y0/ySt)*ySt;v<=Y1;v+=ySt){
    var gy=Math.round(py(v));
    grid+="<line x1='"+PL+"' y1='"+gy+"' x2='"+(PL+CW)+"' y2='"+gy+"' stroke='#eee' stroke-width='1'/>"
      +"<text x='"+(PL-4)+"' y='"+(gy+3)+"' text-anchor='end' font-size='7' fill='#999'>"+(v/1000).toFixed(0)+"k</text>";
  }
  var svg="";
  for(var si=0;si<SR.length;si++){
    var s=SR[si];
    var pts=[];
    for(var i=0;i<dates.length;i++){
      pts.push({x:Math.round(px(s.gX(fh[dates[i]]))*10)/10,y:Math.round(py(s.gY(fh[dates[i]]))*10)/10});
    }
    if(pts.length>1){
      var pd="";for(var i=0;i<pts.length;i++)pd+=(i===0?"M":"L")+pts[i].x+","+pts[i].y;
      svg+="<path d='"+pd+"' fill='none' stroke='"+s.color+"' stroke-width='2' opacity='0.7'/>";
    }
    for(var i=0;i<pts.length-1;i++){
      svg+="<circle cx='"+pts[i].x+"' cy='"+pts[i].y+"' r='4' fill='white' stroke='"+s.color+"' stroke-width='1.5'/>";
    }
    var lp=pts[pts.length-1];
    svg+="<circle cx='"+lp.x+"' cy='"+lp.y+"' r='6' fill='"+s.color+"' fill-opacity='0.9' stroke='white' stroke-width='1'/>"
      +"<text x='"+(lp.x+8)+"' y='"+(lp.y+4)+"' font-size='8' fill='"+s.color+"' font-weight='700'>"+s.label+"</text>";
  }
  var lgnd="";
  for(var si=0;si<SR.length;si++){
    lgnd+="<span style='margin-right:10px;font-size:9px;color:"+SR[si].color+"'>&#9679; "+SR[si].label+"</span>";
  }
  var dl=dates.length>1?dates[0].slice(5)+" 〜 "+dates[dates.length-1].slice(5):dates[0].slice(5);
  return "<div class='ci'>"
    +"<div style='font-weight:700;font-size:11px;text-align:center;margin-bottom:2px'>Goldman Sachs &#8212; 先物建玉推移</div>"
    +"<div style='font-size:9px;text-align:center;color:#888;margin-bottom:4px'>"+dl+"（"+dates.length+"週分）</div>"
    +"<svg width='100%' viewBox='0 0 "+W+" "+H+"' style='overflow:visible'>"
    +grid
    +"<line x1='"+PL+"' y1='"+zy+"' x2='"+(PL+CW)+"' y2='"+zy+"' stroke='#333' stroke-width='1.5'/>"
    +"<line x1='"+zx+"' y1='"+PT+"' x2='"+zx+"' y2='"+(PT+CH)+"' stroke='#333' stroke-width='1.5'/>"
    +"<text x='"+(PL+CW/2)+"' y='"+(H-2)+"' text-anchor='middle' font-size='8' fill='#555'>Sell &lt;&#8212; NK225 &#8212;&gt; Buy</text>"
    +"<text x='10' y='"+(PT+CH/2)+"' text-anchor='middle' font-size='8' fill='#555' transform='rotate(-90,10,"+(PT+CH/2)+")'>Sell &lt;&#8212; TOPIX &#8212;&gt; Buy</text>"
    +svg+"</svg>"
    +"<div style='padding:4px 0;font-size:9px'>"+lgnd+"</div>"
    +"<div style='font-size:8px;color:#aaa;text-align:center'>&#9679; 最新 &#9675; 過去 mini=large&#247;10</div></div>";
}

function selDir(tIdx,dIdx){
  var targets=["nk225","topix"];
  var dirNames=["up","neutral","down"];
  var target=targets[tIdx];
  var dir=dirNames[dIdx];
  predState[target]=dir;
  var p=tIdx===0?"nk":"tx";
  var ids=["up","neu","dn"];
  for(var i=0;i<ids.length;i++){
    var el=document.getElementById(p+"-"+ids[i]);
    if(el)el.style.opacity=i===dIdx?"1":"0.4";
  }
}

function savePred(){
  var memo=document.getElementById("pmemo");
  var sq=document.getElementById("psq");
  if(!memo||!sq)return;
  var oiDate=liveData&&liveData.oi?liveData.oi.date:"";
  var fh=liveData&&liveData.fut_oi_history?liveData.fut_oi_history:{};
  var fDates=Object.keys(fh).sort();
  var futDate=fDates.length?fDates[fDates.length-1]:"";
  var rec={created:new Date().toISOString().slice(0,10),
    oi_date:oiDate,fut_date:futDate,
    nk225_dir:predState.nk225,topix_dir:predState.topix,
    memo:memo.value,sq_date:sq.value,verified:false};
  var recs=loadRecs();recs.push(rec);saveRecs(recs);setTab("c5");
}

function verRec(idx){
  var nkEl=document.getElementById("vr-nk-"+idx);
  var txEl=document.getElementById("vr-tx-"+idx);
  if(!nkEl||!txEl)return;
  var recs=loadRecs();if(!recs[idx])return;
  recs[idx].nk225_actual=nkEl.value;
  recs[idx].topix_actual=txEl.value;
  recs[idx].nk225_correct=recs[idx].nk225_dir===nkEl.value;
  recs[idx].topix_correct=recs[idx].topix_dir===txEl.value;
  recs[idx].verified=true;
  recs[idx].verified_date=new Date().toISOString().slice(0,10);
  saveRecs(recs);setTab("c5");
}

function delRec(idx){
  var recs=loadRecs();recs.splice(idx,1);saveRecs(recs);setTab("c5");
}

function setTab(id){currentTab=id;render();}
function setTabN(i){setTab(["all","c1","c2","c3","c4","c5"][i]);}
function show(id){
  if(id==="c5")return currentTab==="c5";
  return currentTab==="all"||currentTab===id;
}

function safeCard(ok,color,label,fn){
  if(!ok)return"";
  try{return"<div class='card'><div class='hdr' style='background:"+color+"'>"+label+"</div>"+fn()+"</div>";}
  catch(e){return"<div class='card'><div style='padding:12px;color:red;font-size:11px;background:#fff'>Error: "+e.message+"</div></div>";}
}

    "<div style='text-align:center;margin-bottom:12px'>"
    +"<div style='font-size:10px;letter-spacing:2px;color:#00d4ff;border:1px solid rgba(0,212,255,0.2);border-radius:20px;display:inline-block;padding:2px 14px;margin-bottom:6px'>GS DERIVATIVES DASHBOARD &middot; JPX自動取得</div>"
    +"<h1 style='margin:0;font-size:16px;font-weight:700;color:#fff'>Goldman Sachs &#8212; 日経225 先物・オプション 建玉分析</h1>"
    +"<div style='margin-top:4px;font-size:10px;display:flex;justify-content:center;align-items:center;gap:8px'>"+status+"</div></div>"
    +"<div style='display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;align-items:center'>"+tabH+"</div>"
    +"<div style='"+grid+"'>"+c1+c2+c3+c4+"</div>"+c5
    +"<div style='text-align:center;color:#2a4060;font-size:9px;margin-top:12px'>&#10033; JPX公開データに基づきます。投資判断の参考情報です。</div>";
}

render(true,"");
fetch(JSON_URL+"?t="+Date.now())
  .then(function(r){return r.json();})
